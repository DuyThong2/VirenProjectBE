services:
  mssql:
    container_name: viren-mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 6s




  viren.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}

      # Google OAuth
      - GoogleOAuth__ClientId=${GOOGLE_CLIENT_ID}

      # JWT
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__AccessTokenExpirationSeconds=${JWT_ACCESS_TOKEN_EXP_SECONDS}

      # AWS
      - AwsOptions__Region=${AWS_REGION}
      - AwsOptions__Bucket=${AWS_BUCKET}
      - AwsOptions__KeyPrefix=${AWS_KEY_PREFIX}
      - AwsOptions__PublicBaseUrl=${AWS_PUBLIC_BASE_URL}
      - AwsOptions__AccessKey=${AWS_ACCESS_KEY}
      - AwsOptions__SecretKey=${AWS_SECRET_KEY}

      # PayOS
      - PayOS__BaseUrl=${PAYOS_BASE_URL}
      - PayOS__ClientId=${PAYOS_CLIENT_ID}
      - PayOS__ApiKey=${PAYOS_API_KEY}
      - PayOS__ChecksumKey=${PAYOS_CHECKSUM_KEY}
      - PayOS__ReturnUrl=${PAYOS_RETURN_URL}
      - PayOS__CancelUrl=${PAYOS_CANCEL_URL}
      - PayOS__ExpirationSeconds=${PAYOS_EXPIRATION_SECONDS}
      # App
      - App__FrontendBaseUrl=${App__FrontendBaseUrl}

      # Email SMTP
      - Email__Smtp__Host=${Email__Smtp__Host}
      - Email__Smtp__Port=${Email__Smtp__Port}
      - Email__Smtp__Username=${Email__Smtp__Username}
      - Email__Smtp__Password=${Email__Smtp__Password}
      - Email__Smtp__From=${Email__Smtp__From}
  
      - MessageBrokerSettings__Host=amqp://ecommerce-mq:5672
      - MessageBrokerSettings__UserName=guest
      - MessageBrokerSettings__Password=guest

    ports:
      - "7048:8081"
      - "5297:8080"
    restart: unless-stopped
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
    depends_on:
      mssql:
        condition: service_healthy
      messagebroker:
          condition: service_healthy

  postgres:
    container_name: coversation-data-postgres
    environment:
      - POSTGRES_DB=${PG_DB:-viren_langgraph}
      - POSTGRES_USER=${PG_USER:-viren}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-viren_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-viren} -d ${PG_DB:-viren_langgraph}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  messagebroker:
    container_name: messagebroker
    hostname: ecommerce-mq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
        interval: 5s
        timeout: 5s
        retries: 10
        start_period: 10s

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      # telemetry tắt cho gọn (tuỳ image/version, nếu không support thì bỏ dòng này)
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # =====================
  # Python Agents (FastAPI)
  # =====================
  viren.agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}

      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}

      # Vector DB
      - VECTOR_PROVIDER=${VECTOR_PROVIDER}
      - CHROMA_URL=http://chroma:8000
      - CHROMA_COLLECTION=${CHROMA_COLLECTION}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000

      # Embedding
      - EMBED_MODEL=${EMBED_MODEL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}

      # RabbitMQ (dùng hostname ecommerce-mq trong compose)
      - RABBITMQ_URL=amqp://guest:guest@ecommerce-mq:5672/
      - VECTOR_INDEX_QUEUE=${VECTOR_INDEX_QUEUE}

      # JWT (nếu Python verify token)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}

      # Postgres (đổi localhost -> postgres service)
      - PG_URI=postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}?sslmode=disable

    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  mssql_data:
  postgres_data:
  chroma_data: